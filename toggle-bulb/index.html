<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Bulb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toggle-scene">

        <svg class="bulb" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

            <!-- Vidrio del foco: forma A-type (pera) -->
            <path class="bulb__glass" d="
                M 50 13
                C 72 13, 86 27, 86 46
                C 86 63, 75 73, 62 77
                L 60 84
                L 40 84
                L 38 77
                C 25 73, 14 63, 14 46
                C 14 27, 28 13, 50 13
                Z
            "/>

            <!-- Reflejo suave en el vidrio -->
            <ellipse class="bulb__shine" cx="34" cy="32" rx="7" ry="11"
                     transform="rotate(-20 34 32)"/>

            <!-- Soporte interno (filamento stem) -->
            <line class="bulb__stem" x1="50" y1="60" x2="50" y2="77" stroke-width="1.5"/>
            <!-- Filamento en W -->
            <polyline class="bulb__filament"
                      points="41,60 45,52 50,60 55,52 59,60"
                      fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Base metálica: ligeramente más ancha abajo (forma cónica) -->
            <path class="bulb__base" d="M 40 84 L 39 96 L 61 96 L 60 84 Z"/>

            <!-- Líneas de rosca -->
            <line class="bulb__thread" x1="40" y1="87" x2="60" y2="87"/>
            <line class="bulb__thread" x1="39" y1="91" x2="61" y2="91"/>

            <!-- Contacto inferior (tapa del fondo) -->
            <rect class="bulb__contact" x="43" y="96" width="14" height="4" rx="2"/>
        </svg>

        <!-- Cuerda del interruptor (SVG para animar el path) -->
        <svg class="toggle-scene__cord" id="cord"
             viewBox="0 0 40 145"
             xmlns="http://www.w3.org/2000/svg">
            <!-- Zona de hit más ancha que el trazo visual -->
            <rect x="8" y="0" width="24" height="145"
                  fill="transparent" pointer-events="all"/>
            <!-- Línea de la cuerda -->
            <path id="cord-path" class="cord-line" d="M 20 0 L 20 122"/>
            <!-- Tirador (forma gota) -->
            <ellipse id="cord-knob" class="cord-handle"
                     cx="20" cy="131" rx="5.5" ry="7.5"/>
        </svg>

    </div>

    <script src="script.js"></script>
</body>
</html>
